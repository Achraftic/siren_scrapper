name: Scrape Entreprises API

concurrency:
  group: scraping-pipeline
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */5 * * *' # Automatically run every 5 hours
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests

      - name: Run Scraper
        run: python process_all_batches.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changes (including deletions of checkpoints) from the data_api directory
          git add -A data_api/
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update api results and checkpoints $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
        continue-on-error: true

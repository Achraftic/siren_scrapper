name: Scrape Entreprises API

on:
  schedule:
    - cron: '0 */2 * * *' # Automatically run every 2 hours
  workflow_dispatch: # Allow manual triggering from the Actions tab

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch all history for proper pushing

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests

      - name: Run Scraper
        run: python process_all_batches.py
        env:
          # Limit the number of batches per run to avoid GitHub's 6-hour timeout
          MAX_BATCHES_PER_RUN: 1 
          MAX_WORKERS: 4

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are new parquet files
          git add data_api/*.parquet
          
          if git diff --staged --quiet; then
            echo "No new data found. Skipping commit."
          else
            git commit -m "chore: update api results $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
        continue-on-error: true # Prevent failure if push fails due to race conditions
